<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PeakActivity Catalog Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --ink:#0c121f; --prussian:#12192b; --magenta:#d51c57; --magenta-hv:#b91548;
    --bg:var(--ink); --bg2:#0f1626; --bg3:#19233a; --text:#fff; --text2:rgba(255,255,255,.72); --text3:rgba(255,255,255,.48);
    --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.20); --accent:var(--magenta);
    --ok-bg:rgba(52,176,76,.15); --ok-text:#7ee2a0; --ok-bdr:rgba(52,176,76,.4);
    --warn-bg:rgba(213,28,87,.13); --warn-text:#f6b4ca; --warn-bdr:rgba(213,28,87,.34);
    --radius:10px; --pill:999px; --shadow:0 18px 52px rgba(0,0,0,.28);
    --sidebar-w:250px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  @keyframes modalIn { from { opacity:0; transform:translateY(12px) scale(.98); } to { opacity:1; transform:none; } }
  html, body { height:100%; }
  body { font-family:'DM Sans',-apple-system,'Segoe UI',sans-serif; font-size:14px; color:var(--text); background:var(--bg); overflow:hidden; }
  .material-symbols-rounded { font-family:'Material Symbols Rounded'; font-size:20px; line-height:1; display:inline-flex; vertical-align:middle; flex-shrink:0; }

  /* full-screen shell: sidebar + main */
  .app { display:flex; height:100vh; width:100%; }

  /* sidebar */
  .sidebar { width:var(--sidebar-w); flex-shrink:0; background:var(--bg2); border-right:.5px solid var(--border); display:flex; flex-direction:column; padding:20px 14px; }
  .brand { display:flex; align-items:center; gap:10px; padding:4px 8px 18px; }
  .brand .logo { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg, var(--magenta), #ff6aa0); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .brand .logo .material-symbols-rounded { color:#fff; font-size:20px; }
  .brand .wm { line-height:1.15; }
  .brand .wm b { font-size:14px; font-weight:700; display:block; } .brand .wm b .mark-a { color:var(--accent); }
  .brand .wm span { font-size:11px; color:var(--text2); font-weight:600; }
  .nav { display:flex; flex-direction:column; gap:3px; margin-top:6px; }
  .nav-item { position:relative; display:flex; align-items:center; gap:11px; width:100%; text-align:left; background:none; border:none; color:var(--text2); cursor:pointer; font:inherit; font-size:13.5px; font-weight:600; padding:11px 12px; border-radius:9px; transition:.12s; }
  .nav-item .material-symbols-rounded { font-size:20px; }
  .nav-item .lbl { flex:1; }
  .nav-item:hover { background:rgba(255,255,255,.05); color:var(--text); }
  .nav-item.active { background:rgba(213,28,87,.14); color:var(--text); }
  .nav-item.active::before { content:""; position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:3px; background:var(--accent); }
  .nav-count { font-size:11px; font-weight:700; color:var(--text2); background:rgba(255,255,255,.09); padding:1px 8px; border-radius:20px; min-width:22px; text-align:center; }
  .nav-item.active .nav-count { background:var(--accent); color:#fff; }
  .sidebar-foot { margin-top:auto; padding-top:14px; border-top:.5px solid var(--border); }
  .refresh { width:100%; background:none; border:.5px solid var(--border2); color:var(--text2); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:7px; font:inherit; font-size:12.5px; font-weight:600; padding:9px; border-radius:9px; }
  .refresh:hover { color:var(--text); background:rgba(255,255,255,.05); }

  /* main */
  .main { flex:1; min-width:0; overflow-y:auto; height:100vh; }
  .main-head { position:sticky; top:0; z-index:5; padding:22px 30px 14px; background:linear-gradient(180deg, var(--bg) 72%, transparent); }
  .main-head h1 { font-size:20px; font-weight:700; }
  .main-head p { font-size:13px; color:var(--text2); line-height:1.5; margin-top:5px; max-width:720px; }
  .content { padding:6px 30px 40px; }
  .tab-panel { display:none; animation:fadeUp .22s ease both; }
  .tab-panel.active { display:block; }
  .muted { font-size:13px; color:var(--text2); padding:28px 2px; text-align:center; }

  .badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; border:.5px solid transparent; }
  .badge.ok { background:var(--ok-bg); color:var(--ok-text); border-color:var(--ok-bdr); }
  .badge.warn { background:var(--warn-bg); color:var(--warn-text); border-color:var(--warn-bdr); }
  .badge.neutral { background:rgba(255,255,255,.08); color:var(--text2); }
  .btn { height:38px; padding:0 16px; border:.5px solid var(--border2); border-radius:var(--pill); font-size:13px; font-weight:600; font-family:inherit; background:rgba(255,255,255,.05); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:7px; transition:.12s; flex-shrink:0; }
  .btn:hover:not(:disabled){ background:var(--bg3); } .btn:disabled { opacity:.45; cursor:not-allowed; }
  .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); } .btn.primary:hover:not(:disabled){ background:var(--magenta-hv); }
  .btn.ok { background:rgba(52,176,76,.9); border-color:transparent; color:#fff; } .btn.ok:hover:not(:disabled){ background:rgba(52,176,76,1); }
  .btn.danger { background:transparent; border-color:var(--warn-bdr); color:var(--warn-text); } .btn.danger:hover:not(:disabled){ background:var(--warn-bg); }

  .row-card { display:flex; align-items:center; gap:14px; padding:13px 16px; border:.5px solid var(--border); border-radius:var(--radius); background:rgba(255,255,255,.045); margin-bottom:8px; }
  .row-ic { width:38px; height:38px; border-radius:9px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .row-ic .material-symbols-rounded { color:var(--text2); font-size:19px; }
  .row-card.flagged .row-ic { background:var(--warn-bg); } .row-card.flagged .row-ic .material-symbols-rounded { color:var(--warn-text); }
  .row-main { flex:1; min-width:0; }
  .row-name { font-size:13.5px; font-weight:600; margin-bottom:3px; }
  .row-sub { font-size:12px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .draft { border:.5px solid var(--border); border-radius:var(--radius); background:rgba(255,255,255,.045); padding:16px; margin-bottom:12px; max-width:900px; }
  .draft .meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .draft .title { font-size:17px; font-weight:700; margin-bottom:6px; }
  .draft .desc { font-size:13px; line-height:1.6; color:var(--text2); margin-bottom:10px; }
  .draft .bullets { list-style:none; display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .draft .bullets li { display:flex; gap:8px; font-size:12.5px; line-height:1.45; } .draft .bullets li .material-symbols-rounded { font-size:15px; color:var(--accent); }
  .draft .review-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding-top:12px; border-top:.5px solid var(--border); }
  .draft input[type=text] { flex:1; min-width:160px; height:36px; border:.5px solid var(--border2); border-radius:8px; padding:0 12px; font-size:13px; font-family:inherit; background:rgba(255,255,255,.05); color:var(--text); outline:none; }
  .draft input[type=text]:focus { border-color:var(--accent); }
  .draft .status-msg { font-size:12px; color:var(--text2); display:none; }

  /* published catalog */
  .cat-hero { position:relative; overflow:hidden; border:.5px solid var(--border); border-radius:16px; padding:22px 24px; margin-bottom:20px;
    background:radial-gradient(120% 140% at 0% 0%, rgba(213,28,87,.22), transparent 55%), linear-gradient(135deg, #1a2336, #12192b); }
  .cat-hero h2 { font-size:19px; font-weight:700; display:flex; align-items:center; gap:9px; margin-bottom:5px; }
  .cat-hero h2 .material-symbols-rounded { color:var(--ok-text); font-size:23px; }
  .cat-hero p { font-size:13px; color:var(--text2); }
  .cat-hero .hero-stat { position:absolute; top:22px; right:24px; text-align:right; }
  .cat-hero .hero-num { font-size:30px; font-weight:700; line-height:1; }
  .cat-hero .hero-lbl { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; }

  .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
  .cat-card { position:relative; border:.5px solid var(--border); border-radius:14px; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); overflow:hidden; transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease; display:flex; flex-direction:column; cursor:pointer; }
  .cat-card:hover { transform:translateY(-3px); box-shadow:0 16px 34px rgba(0,0,0,.34); border-color:var(--border2); }
  .cat-card .accent { height:4px; background:linear-gradient(90deg, var(--magenta), #ff6aa0); }
  .cat-card .body { padding:16px 17px 17px; display:flex; flex-direction:column; flex:1; }
  .cat-card .chips { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .cat-price { margin-left:auto; font-size:13px; font-weight:700; color:var(--ok-text); background:var(--ok-bg); border:.5px solid var(--ok-bdr); padding:2px 10px; border-radius:20px; }
  .cat-title { font-size:15.5px; font-weight:700; line-height:1.3; margin-bottom:7px; }
  .cat-desc { font-size:12px; color:var(--text2); line-height:1.55; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .cat-bullets { list-style:none; display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  .cat-bullets li { font-size:11.5px; color:var(--text2); display:flex; gap:6px; line-height:1.4; } .cat-bullets li .material-symbols-rounded { font-size:14px; color:var(--ok-text); margin-top:1px; }
  .cat-foot { margin-top:auto; padding-top:12px; border-top:.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .cat-live { font-size:11px; font-weight:600; color:var(--ok-text); display:inline-flex; align-items:center; gap:5px; }
  .cat-live .dot { width:7px; height:7px; border-radius:50%; background:var(--ok-text); box-shadow:0 0 0 3px rgba(52,176,76,.22); }
  .cat-sku { font-size:11px; font-weight:600; color:var(--text3); font-variant-numeric:tabular-nums; }
  .cat-more { font-size:11px; font-weight:600; color:var(--text3); display:inline-flex; align-items:center; gap:3px; }

  /* modal */
  .overlay { position:fixed; inset:0; background:rgba(6,10,18,.66); backdrop-filter:blur(4px); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .overlay.open { display:flex; }
  .modal { width:min(760px,100%); max-height:88vh; overflow-y:auto; background:#141d30; border:.5px solid var(--border2); border-radius:18px; box-shadow:var(--shadow); animation:modalIn .2s ease both; }
  .modal .m-accent { height:5px; background:linear-gradient(90deg, var(--magenta), #ff6aa0); border-radius:18px 18px 0 0; }
  .modal .m-head { position:sticky; top:0; background:#141d30; padding:20px 24px 14px; border-bottom:.5px solid var(--border); display:flex; align-items:flex-start; gap:12px; z-index:1; }
  .modal .m-head .m-title { flex:1; }
  .modal .m-title h2 { font-size:20px; font-weight:700; line-height:1.25; margin-bottom:8px; }
  .modal .m-title .chips { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .m-close { background:rgba(255,255,255,.06); border:.5px solid var(--border2); color:var(--text2); width:34px; height:34px; border-radius:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .m-close:hover { color:var(--text); background:var(--bg3); }
  .m-body { padding:18px 24px 26px; }
  .m-section { margin-bottom:22px; }
  .m-section h3 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:10px; }
  .m-desc { font-size:13.5px; line-height:1.65; color:var(--text2); }
  .m-bullets { list-style:none; display:flex; flex-direction:column; gap:8px; }
  .m-bullets li { display:flex; gap:9px; font-size:13px; line-height:1.5; } .m-bullets li .material-symbols-rounded { font-size:17px; color:var(--ok-text); margin-top:1px; }
  .attr-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1px; background:var(--border); border:.5px solid var(--border); border-radius:10px; overflow:hidden; }
  .attr-cell { background:#141d30; padding:10px 13px; }
  .attr-cell .k { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text3); margin-bottom:3px; }
  .attr-cell .v { font-size:13px; color:var(--text); line-height:1.4; }
  .note-box { background:rgba(213,28,87,.09); border:.5px solid var(--warn-bdr); border-radius:12px; padding:14px 16px; display:flex; gap:11px; }
  .note-box .material-symbols-rounded { color:var(--accent); font-size:19px; margin-top:1px; }
  .note-box .n-body { font-size:13.5px; line-height:1.6; color:var(--text); }
  .note-empty { font-size:13px; color:var(--text3); font-style:italic; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--bg3); border:.5px solid var(--border2); color:var(--text); padding:11px 18px; border-radius:var(--pill); font-size:13px; font-weight:600; box-shadow:var(--shadow); display:none; align-items:center; gap:8px; z-index:120; }

  @media (max-width:820px){
    body { overflow:auto; }
    .app { flex-direction:column; height:auto; }
    .sidebar { width:100%; flex-direction:row; align-items:center; padding:10px 12px; overflow-x:auto; gap:8px; }
    .brand { padding:0 8px 0 4px; border-right:.5px solid var(--border); margin-right:4px; }
    .brand .wm { display:none; }
    .nav { flex-direction:row; margin-top:0; flex:1; }
    .nav-item { padding:9px 11px; white-space:nowrap; }
    .nav-item.active::before { display:none; }
    .nav-item .lbl { display:none; }
    .sidebar-foot { margin-top:0; padding-top:0; border-top:none; }
    .refresh { width:auto; padding:9px 12px; }
    .main { height:auto; overflow:visible; }
    .main-head, .content { padding-left:18px; padding-right:18px; }
    .cat-hero .hero-stat { display:none; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="logo"><span class="material-symbols-rounded">inventory_2</span></span>
      <span class="wm"><b>PEAK<span class="mark-a">A</span>CTIVITY</b><span>Catalog Review</span></span>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item active" data-tab="review" onclick="switchTab('review')"><span class="material-symbols-rounded">rate_review</span><span class="lbl">Awaiting review</span><span class="nav-count" id="reviewCount">–</span></button>
      <button class="nav-item" data-tab="generation" onclick="switchTab('generation')"><span class="material-symbols-rounded">schedule</span><span class="lbl">Awaiting generation</span><span class="nav-count" id="pendingCount">–</span></button>
      <button class="nav-item" data-tab="flagged" onclick="switchTab('flagged')"><span class="material-symbols-rounded">flag</span><span class="lbl">Flagged</span><span class="nav-count" id="excCount">–</span></button>
      <button class="nav-item" data-tab="published" onclick="switchTab('published')"><span class="material-symbols-rounded">verified</span><span class="lbl">Published catalog</span><span class="nav-count" id="pubCount">–</span></button>
    </nav>
    <div class="sidebar-foot">
      <button class="refresh" onclick="loadAll()"><span class="material-symbols-rounded" style="font-size:16px">refresh</span> Refresh</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <h1 id="headTitle">Awaiting review</h1>
      <p id="headDesc"></p>
    </div>
    <div class="content">
      <section class="tab-panel active" data-panel="review"><div id="reviewList"><div class="muted">Loading…</div></div></section>
      <section class="tab-panel" data-panel="generation"><div id="pendingList"><div class="muted">Loading…</div></div></section>
      <section class="tab-panel" data-panel="flagged"><div id="excList"><div class="muted">Loading…</div></div></section>
      <section class="tab-panel" data-panel="published"><div id="catalog"><div class="muted">Loading…</div></div></section>
    </div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = '/api/proxy';
const GENERATOR = '3eab5df9-e093-4ac1-a3d0-e51e6f0a6cb9';
const REVIEW    = '96948586-e360-4f81-b5d8-f0b4733934a6';
const WS = 'df24e40c-57f1-456d-9026-b6a3cedc44bd';
const T_INTAKE = 'tbl_516ec71724dc4709b1a9ba987b268f92';
const T_PUB    = 'tbl_1d47b3b1053a406cb606e2af0d03d9d9';
const T_DRAFT  = 'tbl_c5aad6aab5ed436b871c22988bbc7f9f';
const T_EXC    = 'tbl_f80c040e476c4a0ca73db993401fe64b';
const HDRS  = { 'Content-Type':'application/json' };
const ASYNC = { ...HDRS, 'X-Execution-Mode':'async' };

const TABS = {
  review:     { title:'Awaiting review',     desc:'Generated drafts awaiting a human decision. Approve to publish to the catalog, or reject to send it back to exceptions.' },
  generation: { title:'Awaiting generation', desc:'Drafts are generated automatically each night at 3 AM ET. Use “Generate now” to process a product on demand (~1 min).' },
  flagged:    { title:'Flagged to exceptions', desc:'Products the agent could not confidently document — low confidence, unsupported claims, or missing required fields.' },
  published:  { title:'Published catalog',   desc:'Human-approved products, live in the catalog. Click any product to see its full details and review notes.' },
};

const busy = new Set();
const catalogById = {};   // rowId -> published row (for the modal)

function switchTab(name){
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active', p.dataset.panel===name));
  document.getElementById('headTitle').textContent = TABS[name].title;
  document.getElementById('headDesc').textContent = TABS[name].desc;
}
function icon(n,sz){ return `<span class="material-symbols-rounded"${sz?` style="font-size:${sz}px"`:''}>${n}</span>`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function bulletList(str){ return String(str||'').split('\n').map(s=>s.trim().replace(/^[-•]\s*/,'')).filter(Boolean); }
function envelope(raw){ return raw?.output?.output ?? raw?.output ?? raw; }
function unwrap(raw){ const e=envelope(raw); return (e && typeof e==='object' && 'data' in e) ? e.data : e; }
function toast(msg){ const t=document.getElementById('toast'); t.innerHTML=icon('info',16)+' '+esc(msg); t.style.display='flex'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3200); }

function parseAttrs(row){ try { const a=JSON.parse(row.attributes_json||'[]'); return Array.isArray(a)?a:[]; } catch { return []; } }
function priceOf(row){
  const p = parseAttrs(row).find(a=>/price|msrp/i.test(a.name||''));
  if (p && p.value!=null){ const v=String(p.value).trim(); return /^\$/.test(v)?v:('$'+v.replace(/^\$/,'')); }
  return '';
}

async function tableRows(tableId, filter){
  const q = new URLSearchParams({ workspaceId:WS, limit:'100', includeTotal:'true' });
  if (filter) q.set('filter', JSON.stringify(filter));
  const res = await fetch(`${BASE}/api/v1/tables/${tableId}/rows?${q}`, { headers:HDRS });
  const raw = await res.json();
  const rows = raw?.data?.rows || raw?.rows || [];
  return rows.map(r => ({ __rowId:r.id, __createdAt:r.createdAt, ...(r.data||{}) }));
}

async function poll(id, n){
  if (n > 200) return null;
  if (n > 0) await new Promise(r=>setTimeout(r, 700));
  try {
    const res = await fetch(`${BASE}/api/jobs/${id}`, { headers:HDRS });
    const raw = await res.json();
    const st = raw?.status || raw?.execution?.status;
    if (st === 'completed' || st === 'success') return unwrap(raw);
    if (st === 'failed' || st === 'error') return { _error: raw?.error || 'Workflow failed' };
    return poll(id, n+1);
  } catch { return poll(id, n+1); }
}

async function runWorkflow(wfId, input, headers){
  const res = await fetch(`${BASE}/api/workflows/${wfId}/execute`, { method:'POST', headers: headers||ASYNC, body: JSON.stringify(input||{}) });
  const raw = await res.json();
  if (!res.ok) return { _error: raw?.message || raw?.error || ('Error '+res.status) };
  if (raw?.async) return await poll(raw.jobId || raw.executionId, 0);
  return unwrap(raw);
}

async function loadAll(){
  ['reviewList','pendingList','excList','catalog'].forEach(id=>{ if(!document.getElementById(id).dataset.loaded) document.getElementById(id).innerHTML='<div class="muted">Loading…</div>'; });
  try {
    const [drafts, pending, exc, pub] = await Promise.all([
      tableRows(T_DRAFT, { status:'pending_review' }),
      tableRows(T_INTAKE, { status:'pending' }),
      tableRows(T_EXC),
      tableRows(T_PUB),
    ]);
    drafts.sort((a,b)=> new Date(b.__createdAt||0)-new Date(a.__createdAt||0));
    renderReview(drafts); renderPending(pending); renderExceptions(exc); renderCatalog(pub);
  } catch(e){ document.getElementById('reviewList').innerHTML = `<div class="muted">Could not load data: ${esc(e.message)}</div>`; }
}

function renderReview(rows){
  const el=document.getElementById('reviewList'); el.dataset.loaded='1';
  document.getElementById('reviewCount').textContent = rows.length;
  const usable = rows.filter(r => r.draft_id);
  if (!usable.length){ el.innerHTML='<div class="muted">No drafts awaiting review.</div>'; return; }
  el.innerHTML = usable.map(d => {
    const conf = d.overall_confidence!=null ? Math.round(parseFloat(d.overall_confidence)*100)+'% confidence' : '';
    const bl = bulletList(d.bullets);
    const did = esc(d.draft_id);
    return `<div class="draft" id="draft-${did}">
      <div class="meta">
        <span class="badge neutral">${esc(d.category||'')}</span>
        <span class="badge neutral">${esc(d.sku||'')}</span>
        ${conf?`<span class="badge ok">${esc(conf)}</span>`:''}
      </div>
      <div class="title">${esc(d.title||'(untitled)')}</div>
      <div class="desc">${esc(d.description||'')}</div>
      ${bl.length?`<ul class="bullets">${bl.map(b=>`<li>${icon('check')}<span>${esc(b)}</span></li>`).join('')}</ul>`:''}
      <div class="review-row">
        <input type="text" id="et-${did}" placeholder="Edited title (optional)" />
        <input type="text" id="nt-${did}" placeholder="Notes (optional)" />
        <button class="btn danger" onclick="decide('${did}','reject')">${icon('close',18)} Reject</button>
        <button class="btn ok" onclick="decide('${did}','approve')">${icon('check',18)} Approve</button>
      </div>
      <div class="status-msg" id="sm-${did}"></div>
    </div>`;
  }).join('');
}

function renderPending(rows){
  const el=document.getElementById('pendingList'); el.dataset.loaded='1';
  document.getElementById('pendingCount').textContent = rows.length;
  if (!rows.length){ el.innerHTML='<div class="muted">No products awaiting generation.</div>'; return; }
  el.innerHTML = rows.map(r => {
    const sku=esc(r.sku);
    const hasFile = (r.file_url || r.drive_file_id) ? `<span class="badge neutral">${icon(r.drive_file_id?'add_to_drive':'description',13)} ${r.drive_file_id?'Drive':'file'}</span>` : '';
    return `<div class="row-card" id="pend-${sku}">
      <div class="row-ic">${icon('inventory_2')}</div>
      <div class="row-main">
        <div class="row-name">${esc(r.category||'Product')} · ${esc(r.vendor_id||'')}</div>
        <div class="row-sub">${esc(r.source_text||'')}</div>
      </div>
      ${hasFile}
      <span class="badge neutral">${sku}</span>
      <button class="btn primary" id="gen-${sku}" onclick="generate('${sku}')">${icon('auto_awesome',17)} Generate now</button>
    </div>`;
  }).join('');
}

function renderExceptions(rows){
  const el=document.getElementById('excList'); el.dataset.loaded='1';
  document.getElementById('excCount').textContent = rows.length;
  if (!rows.length){ el.innerHTML='<div class="muted">No flagged products.</div>'; return; }
  el.innerHTML = rows.map(r => `<div class="row-card flagged">
    <div class="row-ic">${icon('flag')}</div>
    <div class="row-main">
      <div class="row-name">${esc(r.category||'Product')} · ${esc(r.vendor_id||'')}</div>
      <div class="row-sub">${esc(r.detail||r.reason||'')}</div>
    </div>
    <span class="badge neutral">${esc(r.sku||'')}</span>
    ${r.missing_fields?`<span class="badge warn">Missing: ${esc(r.missing_fields)}</span>`:''}
  </div>`).join('');
}

function renderCatalog(rows){
  const el=document.getElementById('catalog'); el.dataset.loaded='1';
  document.getElementById('pubCount').textContent = rows.length;
  Object.keys(catalogById).forEach(k=>delete catalogById[k]);
  rows.forEach(r=>{ catalogById[r.__rowId]=r; });
  const hero = `<div class="cat-hero">
    <h2>${icon('verified')} Published catalog</h2>
    <div class="hero-stat"><div class="hero-num">${rows.length}</div><div class="hero-lbl">Live products</div></div>
  </div>`;
  if (!rows.length){ el.innerHTML = hero + '<div class="muted">No published products yet. Approve a draft to see it here.</div>'; return; }
  el.innerHTML = hero + `<div class="cat-grid">${rows.map(r=>{
    const price = priceOf(r);
    return `<div class="cat-card" onclick="openProduct('${esc(r.__rowId)}')">
    <div class="accent"></div>
    <div class="body">
      <div class="chips">
        ${r.category?`<span class="badge neutral">${esc(r.category)}</span>`:''}
        ${r.vendor_id?`<span class="badge neutral">${esc(r.vendor_id)}</span>`:''}
        ${price?`<span class="cat-price">${esc(price)}</span>`:''}
      </div>
      <div class="cat-title">${esc(r.title||'(untitled)')}</div>
      <div class="cat-desc">${esc(r.description||'')}</div>
      <ul class="cat-bullets">${bulletList(r.bullets).slice(0,3).map(b=>`<li>${icon('check',14)}<span>${esc(b)}</span></li>`).join('')}</ul>
      <div class="cat-foot">
        <span class="cat-more">${icon('open_in_full',12)} View details</span>
        <span class="cat-sku">${esc(r.sku||'')}</span>
      </div>
    </div>
  </div>`;}).join('')}</div>`;
}

function openProduct(rowId){
  const r = catalogById[rowId]; if(!r) return;
  const price = priceOf(r);
  const bl = bulletList(r.bullets);
  const attrs = parseAttrs(r).map(a=>{
    let v=a.value; if(Array.isArray(v)) v=v.join(', ');
    return { k:String(a.name||'').replace(/_/g,' '), v:String(v==null?'':v) };
  }).filter(a=>a.k && a.v);
  const notes = String(r.notes||'').trim();
  const m = document.getElementById('modal');
  m.innerHTML = `<div class="m-accent"></div>
    <div class="m-head">
      <div class="m-title">
        <h2>${esc(r.title||'(untitled)')}</h2>
        <div class="chips">
          ${r.category?`<span class="badge neutral">${esc(r.category)}</span>`:''}
          ${r.vendor_id?`<span class="badge neutral">${esc(r.vendor_id)}</span>`:''}
          ${r.sku?`<span class="badge neutral">${esc(r.sku)}</span>`:''}
          ${price?`<span class="cat-price">${esc(price)}</span>`:''}
          <span class="badge ok">${icon('check',13)} Live</span>
        </div>
      </div>
      <button class="m-close" onclick="closeModal()">${icon('close',20)}</button>
    </div>
    <div class="m-body">
      ${r.description?`<div class="m-section"><h3>Description</h3><div class="m-desc">${esc(r.description)}</div></div>`:''}
      ${bl.length?`<div class="m-section"><h3>Feature bullets</h3><ul class="m-bullets">${bl.map(b=>`<li>${icon('check')}<span>${esc(b)}</span></li>`).join('')}</ul></div>`:''}
      ${attrs.length?`<div class="m-section"><h3>Extracted attributes (${attrs.length})</h3><div class="attr-grid">${attrs.map(a=>`<div class="attr-cell"><div class="k">${esc(a.k)}</div><div class="v">${esc(a.v)}</div></div>`).join('')}</div></div>`:''}
      <div class="m-section" style="margin-bottom:0">
        <h3>Human review notes</h3>
        ${notes ? `<div class="note-box">${icon('rate_review')}<div class="n-body">${esc(notes)}</div></div>` : `<div class="note-empty">No notes were recorded during review.</div>`}
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

async function generate(sku){
  if (busy.has('gen-'+sku)) return; busy.add('gen-'+sku);
  const btn=document.getElementById('gen-'+sku);
  if (btn){ btn.disabled=true; btn.innerHTML=`<span class="material-symbols-rounded" style="font-size:16px;animation:spin 1s linear infinite">progress_activity</span> Generating…`; }
  const data = await runWorkflow(GENERATOR, { target_sku: sku }, ASYNC);
  busy.delete('gen-'+sku);
  if (data?._error) toast('Generation failed: '+data._error);
  else { toast(sku + ' processed — see “Awaiting review” (or “Flagged”).'); switchTab('review'); }
  await loadAll();
}

async function decide(draftId, decision){
  if (busy.has(draftId)) return; busy.add(draftId);
  const et=document.getElementById('et-'+draftId), nt=document.getElementById('nt-'+draftId);
  const sm=document.getElementById('sm-'+draftId);
  const card=document.getElementById('draft-'+draftId);
  card?.querySelectorAll('button').forEach(b=>b.disabled=true);
  if (sm){ sm.style.display='block'; sm.textContent = decision==='approve'?'Publishing…':'Rejecting…'; }
  const data = await runWorkflow(REVIEW, { draft_id: draftId, decision, edited_title:(et?.value||'').trim(), notes:(nt?.value||'').trim() }, ASYNC);
  busy.delete(draftId);
  const status = data?.status || data?.data?.status;
  if (data?._error) { toast('Failed: '+data._error); card?.querySelectorAll('button').forEach(b=>b.disabled=false); if(sm) sm.style.display='none'; return; }
  if (status === 'published') toast('Published to the catalog.');
  else if (status === 'needs_revision') toast('Rejected — sent to exceptions.');
  else toast('Done.');
  await loadAll();
}

switchTab('review');
loadAll();
</script>
</body>
</html>
