<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PeakActivity Catalog Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --ink:#0c121f; --prussian:#12192b; --magenta:#d51c57; --magenta-hv:#b91548; --magenta-dn:#8f1038;
    --bg:var(--ink); --bg2:var(--prussian); --bg3:#19233a; --text:#fff; --text2:rgba(255,255,255,.72); --text3:rgba(255,255,255,.48);
    --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.20); --accent:var(--magenta);
    --ok-bg:rgba(52,176,76,.15); --ok-text:#7ee2a0; --ok-bdr:rgba(52,176,76,.4);
    --warn-bg:rgba(213,28,87,.13); --warn-text:#f6b4ca; --warn-bdr:rgba(213,28,87,.34);
    --err-bg:rgba(213,28,87,.16); --err-text:#ffbdd2; --err-bdr:rgba(213,28,87,.42);
    --radius:10px; --pill:999px; --shadow:0 18px 52px rgba(0,0,0,.28);
  }
  body { font-family:'DM Sans',-apple-system,'Segoe UI',sans-serif; font-size:14px; color:var(--text); background:var(--bg); min-height:100vh; }
  .app { max-width:820px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; border-left:.5px solid var(--border); border-right:.5px solid var(--border); box-shadow:var(--shadow); }
  .material-symbols-rounded { font-family:'Material Symbols Rounded'; font-size:20px; line-height:1; display:inline-flex; vertical-align:middle; flex-shrink:0; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:.5px solid var(--border); position:sticky; top:0; background:rgba(12,18,31,.94); backdrop-filter:blur(18px); z-index:10; }
  .brand { display:flex; align-items:center; gap:14px; } .pa-wordmark { font-size:15px; font-weight:700; } .pa-wordmark .mark-a { color:var(--accent); }
  .topbar-title { font-size:12px; font-weight:600; color:var(--text2); border-left:.5px solid var(--border2); padding-left:13px; }
  .refresh { background:none; border:none; color:var(--text2); cursor:pointer; display:inline-flex; align-items:center; gap:6px; font:inherit; font-size:12px; font-weight:600; }
  .refresh:hover { color:var(--text); }
  .content { flex:1; padding:22px; display:flex; flex-direction:column; gap:28px; }
  .section-head { display:flex; align-items:center; gap:9px; margin-bottom:14px; }
  .section-head h2 { font-size:15px; font-weight:700; } .section-head .material-symbols-rounded { color:var(--accent); font-size:19px; }
  .count { font-size:12px; font-weight:600; color:var(--text2); background:rgba(255,255,255,.07); padding:2px 9px; border-radius:20px; }
  .muted { font-size:13px; color:var(--text2); padding:14px 2px; }

  .row-card { display:flex; align-items:center; gap:14px; padding:14px 16px; border:.5px solid var(--border); border-radius:var(--radius); background:rgba(255,255,255,.045); margin-bottom:8px; }
  .row-ic { width:40px; height:40px; border-radius:9px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .row-ic .material-symbols-rounded { color:var(--text2); font-size:20px; }
  .row-main { flex:1; min-width:0; }
  .row-name { font-size:14px; font-weight:600; margin-bottom:3px; }
  .row-sub { font-size:12px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; }
  .row-tags { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }

  .badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; border:.5px solid transparent; }
  .badge.ok { background:var(--ok-bg); color:var(--ok-text); border-color:var(--ok-bdr); }
  .badge.warn { background:var(--warn-bg); color:var(--warn-text); border-color:var(--warn-bdr); }
  .badge.neutral { background:rgba(255,255,255,.08); color:var(--text2); }

  .btn { height:40px; padding:0 18px; border:.5px solid var(--border2); border-radius:var(--pill); font-size:13px; font-weight:600; font-family:inherit; background:rgba(255,255,255,.05); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:7px; transition:.12s; flex-shrink:0; }
  .btn:hover:not(:disabled){ background:var(--bg3); } .btn:disabled { opacity:.42; cursor:not-allowed; }
  .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); } .btn.primary:hover:not(:disabled){ background:var(--magenta-hv); }
  .btn.ok { background:rgba(52,176,76,.9); border-color:transparent; color:#fff; } .btn.ok:hover:not(:disabled){ background:rgba(52,176,76,1); }
  .btn.danger { background:transparent; border-color:var(--err-bdr); color:var(--err-text); } .btn.danger:hover:not(:disabled){ background:var(--err-bg); }

  .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
  .cat-card { border:.5px solid var(--border); border-radius:var(--radius); background:rgba(255,255,255,.045); padding:15px 16px; }
  .cat-title { font-size:14px; font-weight:700; margin-bottom:6px; }
  .cat-desc { font-size:12px; color:var(--text2); line-height:1.5; margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
  .cat-bullets { list-style:none; display:flex; flex-direction:column; gap:4px; }
  .cat-bullets li { font-size:11.5px; color:var(--text2); display:flex; gap:6px; line-height:1.4; }
  .cat-bullets li .material-symbols-rounded { font-size:14px; color:var(--ok-text); }

  /* Review overlay */
  .overlay { position:fixed; inset:0; background:rgba(6,10,18,.72); backdrop-filter:blur(6px); display:none; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; z-index:50; }
  .overlay.active { display:flex; }
  .modal { width:100%; max-width:600px; background:var(--bg2); border:.5px solid var(--border2); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; }
  .modal-head { padding:16px 20px; border-bottom:.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-head h3 { font-size:15px; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--text2); cursor:pointer; } .modal-close:hover { color:var(--text); }
  .modal-body { padding:20px; display:flex; flex-direction:column; gap:16px; }
  .modal-center { padding:44px 20px; display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center; }
  .spinner { width:30px; height:30px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .field-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text3); margin-bottom:6px; }
  .title-lg { font-size:19px; font-weight:700; margin-bottom:6px; } .meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .desc { font-size:14px; line-height:1.6; }
  .bullets { list-style:none; display:flex; flex-direction:column; gap:8px; } .bullets li { display:flex; gap:9px; font-size:13px; line-height:1.5; } .bullets li .material-symbols-rounded { font-size:16px; color:var(--accent); }
  input[type=text], textarea { width:100%; border:.5px solid var(--border2); border-radius:8px; padding:10px 13px; font-size:14px; font-family:inherit; background:rgba(255,255,255,.05); color:var(--text); outline:none; }
  input[type=text]:focus, textarea:focus { border-color:var(--accent); }
  .actions { display:flex; gap:10px; } .actions .btn { flex:1; height:46px; }
  .err { background:var(--err-bg); color:var(--err-text); border:.5px solid var(--err-bdr); border-radius:8px; padding:10px 14px; font-size:13px; display:none; }
  .result-icon { font-size:52px; }
  @media (max-width:560px){ .app { border:none; } .content { padding:16px; } }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="pa-wordmark">PEAK<span class="mark-a">A</span>CTIVITY</div><span class="topbar-title">Catalog Review</span></div>
    <button class="refresh" onclick="loadAll()"><span class="material-symbols-rounded" style="font-size:16px">refresh</span> Refresh</button>
  </div>

  <div class="content">
    <div>
      <div class="section-head"><span class="material-symbols-rounded">pending_actions</span><h2>Pending products</h2><span class="count" id="pendingCount">–</span></div>
      <div id="pendingList"><div class="muted">Loading…</div></div>
    </div>

    <div>
      <div class="section-head"><span class="material-symbols-rounded">flag</span><h2>Flagged to exceptions</h2><span class="count" id="excCount">–</span></div>
      <div id="excList"><div class="muted">Loading…</div></div>
    </div>

    <div>
      <div class="section-head"><span class="material-symbols-rounded">verified</span><h2>Published catalog</h2><span class="count" id="pubCount">–</span></div>
      <div id="catalog"><div class="muted">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Review overlay -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3 id="mTitle">Review</h3><button class="modal-close" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
    <div id="mContent"></div>
  </div>
</div>

<script>
const BASE = '/api/proxy';
const WF   = '44da1598-4d4b-482d-97f8-682b96f36493';
const WS   = 'df24e40c-57f1-456d-9026-b6a3cedc44bd';
const T_INTAKE = 'tbl_516ec71724dc4709b1a9ba987b268f92';
const T_PUB    = 'tbl_1d47b3b1053a406cb606e2af0d03d9d9';
const T_DRAFT  = 'tbl_c5aad6aab5ed436b871c22988bbc7f9f';
const T_EXC    = 'tbl_f80c040e476c4a0ca73db993401fe64b';
const HDRS  = { 'Content-Type':'application/json' };
const ASYNC = { ...HDRS, 'X-Execution-Mode':'async' };

let S = { resumeUrl:null, sku:null, busy:false };

function icon(n,sz){ return `<span class="material-symbols-rounded"${sz?` style="font-size:${sz}px"`:''}>${n}</span>`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function bulletList(str){ return String(str||'').split('\n').map(s=>s.trim().replace(/^[-•]\s*/,'')).filter(Boolean); }
function envelope(raw){ return raw?.output?.output ?? raw?.output ?? raw; }
function unwrap(raw){ const e=envelope(raw); return (e && typeof e==='object' && 'data' in e) ? e.data : e; }
function resumeOf(raw){ const e=envelope(raw); return raw?._resume || e?._resume || e?.data?._resume || null; }

async function tableRows(tableId, filter){
  const q = new URLSearchParams({ workspaceId:WS, limit:'100', includeTotal:'true' });
  if (filter) q.set('filter', JSON.stringify(filter));
  const res = await fetch(`${BASE}/api/v1/tables/${tableId}/rows?${q}`, { headers:HDRS });
  const raw = await res.json();
  const rows = raw?.data?.rows || raw?.rows || [];
  return rows.map(r => ({ id:r.id, createdAt:r.createdAt, ...(r.data||{}) }));
}

async function loadAll(){
  renderPending(null); renderExceptions(null); renderCatalog(null);
  try {
    const [pending, exc, pub] = await Promise.all([
      tableRows(T_INTAKE, { status:'pending' }),
      tableRows(T_EXC),
      tableRows(T_PUB),
    ]);
    renderPending(pending); renderExceptions(exc); renderCatalog(pub);
  } catch(e){
    document.getElementById('pendingList').innerHTML = `<div class="err" style="display:block">Could not load data: ${esc(e.message)}</div>`;
  }
}

function renderPending(rows){
  const el = document.getElementById('pendingList');
  document.getElementById('pendingCount').textContent = rows ? rows.length : '–';
  if (rows === null) { el.innerHTML = '<div class="muted">Loading…</div>'; return; }
  if (!rows.length) { el.innerHTML = '<div class="muted">No pending products. Everything has been processed.</div>'; return; }
  el.innerHTML = rows.map(r => `
    <div class="row-card">
      <div class="row-ic">${icon('inventory_2')}</div>
      <div class="row-main">
        <div class="row-name">${esc(r.category||'Product')} · ${esc(r.vendor_id||'')}</div>
        <div class="row-sub">${esc(r.source_text||'')}</div>
        <div class="row-tags"><span class="badge neutral">${esc(r.sku||'')}</span></div>
      </div>
      <button class="btn primary" onclick="reviewProduct('${esc(r.sku)}','${esc((r.category||'Product')+' · '+(r.vendor_id||''))}')">${icon('play_arrow',18)} Review</button>
    </div>`).join('');
}

function renderExceptions(rows){
  const el = document.getElementById('excList');
  document.getElementById('excCount').textContent = rows ? rows.length : '–';
  if (rows === null) { el.innerHTML = '<div class="muted">Loading…</div>'; return; }
  if (!rows.length) { el.innerHTML = '<div class="muted">No flagged products.</div>'; return; }
  el.innerHTML = rows.map(r => `
    <div class="row-card">
      <div class="row-ic">${icon('flag')}</div>
      <div class="row-main">
        <div class="row-name">${esc(r.category||'Product')} · ${esc(r.vendor_id||'')}</div>
        <div class="row-sub">${esc(r.detail||r.reason||'')}</div>
        <div class="row-tags"><span class="badge neutral">${esc(r.sku||'')}</span>${r.missing_fields?`<span class="badge warn">Missing: ${esc(r.missing_fields)}</span>`:''}</div>
      </div>
    </div>`).join('');
}

function renderCatalog(rows){
  const el = document.getElementById('catalog');
  document.getElementById('pubCount').textContent = rows ? rows.length : '–';
  if (rows === null) { el.innerHTML = '<div class="muted">Loading…</div>'; return; }
  if (!rows.length) { el.innerHTML = '<div class="muted">No published products yet.</div>'; return; }
  el.innerHTML = `<div class="cat-grid">${rows.map(r => `
    <div class="cat-card">
      <div class="meta"><span class="badge neutral">${esc(r.category||'')}</span>${r.vendor_id?`<span class="badge neutral">${esc(r.vendor_id)}</span>`:''}</div>
      <div class="cat-title">${esc(r.title||'(untitled)')}</div>
      <div class="cat-desc">${esc(r.description||'')}</div>
      <ul class="cat-bullets">${bulletList(r.bullets).slice(0,4).map(b=>`<li>${icon('check',14)}<span>${esc(b)}</span></li>`).join('')}</ul>
    </div>`).join('')}</div>`;
}

/* ---- Review flow ---- */
function openModal(){ document.getElementById('overlay').classList.add('active'); }
function closeModal(){ if (S.busy) return; document.getElementById('overlay').classList.remove('active'); S={ resumeUrl:null, sku:null, busy:false }; }
function modalCenter(html){ document.getElementById('mContent').innerHTML = `<div class="modal-center">${html}</div>`; }

async function poll(id, n){
  if (n > 200) return null;                 // ~140s; prod queue latency can be 50s+
  if (n > 0) await new Promise(r=>setTimeout(r, 700));
  try {
    const res = await fetch(`${BASE}/api/jobs/${id}`, { headers:HDRS });
    const raw = await res.json();
    const resume = resumeOf(raw);
    if (resume?.apiUrl) return { ...(unwrap(raw)||{}), _resume:resume };
    const st = raw?.status || raw?.execution?.status;
    if (st === 'completed' || st === 'success') return unwrap(raw);
    if (st === 'failed' || st === 'error') return { _error: raw?.error || 'Workflow failed' };
    return poll(id, n+1);
  } catch { return poll(id, n+1); }
}

function proxied(u){ try { const x=new URL(u); return `${BASE}${x.pathname}${x.search}`; } catch { return u; } }

async function reviewProduct(sku, label){
  S = { resumeUrl:null, sku, busy:true };
  document.getElementById('mTitle').textContent = label || sku;
  modalCenter(`<div class="spinner"></div><div style="font-weight:600">Running the documentation agent…</div><div class="muted">Extracting attributes, generating copy, and running the safety checks. This can take up to a minute.</div>`);
  openModal();
  try {
    const res = await fetch(`${BASE}/api/workflows/${WF}/execute`, { method:'POST', headers:ASYNC, body: JSON.stringify({ target_sku: sku }) });
    const raw = await res.json();
    if (!res.ok) { modalCenter(`${icon('error',48)}<div style="font-weight:600">Couldn't start</div><div class="muted">${esc(raw?.message||raw?.error||('Error '+res.status))}</div>`); S.busy=false; return; }
    const data = raw?.async ? await poll(raw.jobId || raw.executionId, 0) : unwrap(raw);
    S.busy = false;
    if (!data || data._error) { modalCenter(`${icon('error',48)}<div style="font-weight:600">Something went wrong</div><div class="muted">${esc(data?._error||'Timed out waiting for the workflow.')}</div>`); return; }
    if (data?._resume?.apiUrl) { S.resumeUrl = proxied(data._resume.apiUrl); const draft = await fetchDraft(sku); renderReview(draft); return; }
    const status = data?.status || data?.data?.status;
    if (status === 'flagged_to_exceptions') { const x = await fetchException(sku); showModalResult('flag', x); loadAll(); return; }
    if (status === 'published') { showModalResult('published'); loadAll(); return; }
    if (status === 'needs_revision') { showModalResult('rejected'); loadAll(); return; }
    modalCenter(`${icon('help',48)}<div style="font-weight:600">Unexpected response</div>`);
  } catch(e){ S.busy=false; modalCenter(`${icon('error',48)}<div style="font-weight:600">Network error</div><div class="muted">${esc(e.message)}</div>`); }
}

async function fetchDraft(sku){
  try {
    const rows = await tableRows(T_DRAFT, { sku, status:'pending_review' });
    rows.sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0));
    return rows[0] || null;
  } catch { return null; }
}
async function fetchException(sku){
  try {
    const rows = await tableRows(T_EXC, { sku });
    rows.sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0));
    return rows[0] || null;
  } catch { return null; }
}

function renderReview(d){
  const conf = d && d.overall_confidence!=null ? Math.round(parseFloat(d.overall_confidence)*100)+'% confidence' : '';
  const missing = (d?.missing_fields||'').trim();
  const bl = bulletList(d?.bullets);
  document.getElementById('mContent').innerHTML = `
    <div class="modal-body">
      <div>
        <div class="meta">
          ${d?.category?`<span class="badge neutral">${esc(d.category)}</span>`:''}
          ${d?.sku?`<span class="badge neutral">${esc(d.sku)}</span>`:''}
          ${conf?`<span class="badge ok">${esc(conf)}</span>`:''}
          ${missing?`<span class="badge warn">${icon('warning',13)} Missing: ${esc(missing)}</span>`:''}
        </div>
        <div class="title-lg">${esc(d?.title||'(draft not found — you can still decide)')}</div>
        <div class="desc">${esc(d?.description||'')}</div>
      </div>
      ${bl.length?`<div><div class="field-label">Feature bullets</div><ul class="bullets">${bl.map(b=>`<li>${icon('check')}<span>${esc(b)}</span></li>`).join('')}</ul></div>`:''}
      <div><div class="field-label">Edited title (optional)</div><input type="text" id="editedTitle" placeholder="Leave blank to keep the generated title"/></div>
      <div><div class="field-label">Notes (optional)</div><textarea id="notes" rows="2" placeholder="Reason for rejection, or a note for the record"></textarea></div>
      <div class="err" id="mErr"></div>
      <div class="actions">
        <button class="btn danger" id="rejectBtn" onclick="decide('reject')">${icon('close')} Reject</button>
        <button class="btn ok" id="approveBtn" onclick="decide('approve')">${icon('check')} Approve &amp; publish</button>
      </div>
    </div>`;
}

async function decide(decision){
  if (!S.resumeUrl) return;
  S.busy = true;
  const ab=document.getElementById('approveBtn'), rb=document.getElementById('rejectBtn');
  if (ab) ab.disabled=true; if (rb) rb.disabled=true;
  const body = { decision, edited_title: (document.getElementById('editedTitle')?.value||'').trim(), notes: (document.getElementById('notes')?.value||'').trim() };
  modalCenter(`<div class="spinner"></div><div style="font-weight:600">${decision==='approve'?'Publishing…':'Sending back…'}</div><div class="muted">Resuming the workflow with your decision.</div>`);
  try {
    const res = await fetch(S.resumeUrl, { method:'POST', headers:ASYNC, body: JSON.stringify(body) });
    const raw = await res.json();
    const immediate = unwrap(raw);
    const jobId = raw?.jobId || (raw?.async ? raw?.executionId : null);
    const data = jobId ? await poll(jobId, 0) : immediate;
    S.busy = false;
    const status = data?.status || data?.data?.status || immediate?.status;
    if (status === 'published') showModalResult('published');
    else if (status === 'needs_revision') showModalResult('rejected');
    else if (status === 'flagged_to_exceptions') { const x = await fetchException(S.sku); showModalResult('flag', x); }
    else showModalResult(decision==='approve'?'published':'rejected');
    loadAll();
  } catch(e){ S.busy=false; modalCenter(`${icon('error',48)}<div style="font-weight:600">Network error</div><div class="muted">${esc(e.message)}</div><button class="btn primary" onclick="closeModal()" style="margin-top:8px">Close</button>`); }
}

function showModalResult(kind, extra){
  const cfg = {
    published: ['task_alt','var(--ok-text)','Published','Approved and written to the published catalog.'],
    rejected:  ['undo','var(--warn-text)','Sent back for revision','Rejected and routed to the exceptions queue.'],
    flag:      ['flag','var(--warn-text)','Flagged to exceptions','Did not pass the confidence/claims gate.'],
  }[kind] || ['help','var(--text2)','Done',''];
  let sub = cfg[3];
  if (kind==='flag' && extra?.detail) sub += ' Reason: ' + extra.detail;
  modalCenter(`<span class="material-symbols-rounded result-icon" style="color:${cfg[1]}">${cfg[0]}</span><div style="font-weight:700;font-size:17px">${cfg[2]}</div><div class="muted">${esc(sub)}</div><button class="btn primary" onclick="closeModal()" style="margin-top:6px">${icon('done')} Done</button>`);
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target.id==='overlay') closeModal(); });
loadAll();
</script>
</body>
</html>
